<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch API Task - Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="weather-box">
    <h1>Weather Checker</h1>
    <p class="subtitle">Type any city name and hit search</p>

    <div class="search-row">
      <input type="text" id="city-input" placeholder="e.g. Ranchi, Delhi, Mumbai">
      <button id="search-btn">Search</button>
    </div>

    <div id="result-area">
      <p id="status-text">Enter a city to see the weather</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
