<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Listing - Filter & Sort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <h1>Our Products</h1>
    <p>Filter and sort to find exactly what you're looking for</p>
  </header>

  <div class="controls">
    <div class="control-group">
      <label for="category-filter">Category</label>
      <select id="category-filter">
        <option value="all">All</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="books">Books</option>
        <option value="home">Home</option>
      </select>
    </div>

    <div class="control-group">
      <label for="price-filter">Max Price</label>
      <input type="range" id="price-filter" min="0" max="10000" step="500" value="10000">
      <span id="price-display">₹10000</span>
    </div>

    <div class="control-group">
      <label for="sort-select">Sort By</label>
      <select id="sort-select">
        <option value="default">Default</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="rating">Rating: High to Low</option>
      </select>
    </div>
  </div>

  <div id="product-grid" class="product-grid">
    <!-- products JS se yaha render honge -->
  </div>

  <p id="no-results">No products match your filters.</p>

  <script src="script.js"></script>
</body>
</html>
